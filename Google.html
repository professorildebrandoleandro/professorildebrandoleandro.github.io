<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
    background: url("imagens/portuga.jpg") center/cover no-repeat;
    color:white;
}

/* FUNDO ESCURO */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

/* CONTEÚDO NA FRENTE */
.container, .rodape{
    position:relative;
    z-index:1;
}

/* CENTRAL */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    width:100%;
}

/* 🔥 TÍTULO — BRANCO FIXO + NEON VERMELHO FORTE */
.neon{
    font-size:70px;
    color:#ffffff;
    letter-spacing:3px;

    text-shadow:
        0 0 5px #ffffff,
        0 0 1px #ffffff,
        0 0 20px #ff0000,
        0 0 4px #ff0000,
        0 0 8px #ff0000,
        0 0 12px #ff0000,
        0 0 20px #ff0000,
        0 0 30px #ff0000;
}

/* INPUT */
input{
    padding:12px;
    width:300px;
    font-size:18px;
    border:none;
    outline:none;
}

/* BOTÃO */
button{
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff0000;
    box-shadow:0 0 20px red;
}

/* 🔥 RODAPÉ */
.rodape{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:90px;
    background:#000;
    display:flex;
    align-items:center;
    overflow:hidden;
    border-top:4px solid red;
}

/* TEXTO DO RODAPÉ */
.marquee{
    white-space:nowrap;
    display:inline-block;
    font-size:45px;
    font-weight:bold;
    padding-left:100%;

    color:#ffffff;

    text-shadow:
        0 0 5px #ffffff,
        0 0 10px #ffffff,
        0 0 20px red,
        0 0 40px red,
        0 0 80px red;

    animation: correr 20s linear infinite, piscarRodape 1s infinite;
}

/* LINK SEM SUBLINHADO */
.marquee a{
    color:#ffffff;
    text-decoration:none;
}

/* ANIMAÇÃO RODAPÉ */
@keyframes piscarRodape{
    0%{
        opacity:1;
        text-shadow:
            0 0 5px #f8f3f7,
            0 0 10px red;
    }
    50%{
        opacity:0.6;
        text-shadow:
            0 0 20px #fff,
            0 0 60px rgb(255, 0, 0);
    }
    100%{
        opacity:1;
        text-shadow:
            0 0 5px #fff,
            0 0 120px red;
    }
}

/* MOVIMENTO */
@keyframes correr{
    from{ transform:translateX(0); }
    to{ transform:translateX(-100%); }
}

/* RESPONSIVO */
@media(max-width:768px){
    .neon{font-size:40px;}
    input{width:90%;}
    .marquee{font-size:22px;}
}

</style>
